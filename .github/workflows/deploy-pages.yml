name: Deploy tools to Pages

# Publishes a single Pages site containing all browser tools, each under its
# own path, plus a landing page at the root:
#   /                       -> landing/index.html
#   /<tool>/                -> <tool>/   (auto-discovered: any top-level dir with an index.html)
#
# Tools are discovered automatically at build time, so adding a new tool needs
# NOTHING here — just create its directory (with an index.html) and add a card
# on the landing page. Runs on push to the default branch, or manually.

on:
  push:
    branches: [main]
    # Deploy on any content change EXCEPT files that never affect the live site.
    # This way a new tool directory is covered automatically (no path to update).
    paths-ignore:
      - ".claude/**"
      - "**/*.md"
      - ".gitignore"
      - ".mcp.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p _site

          # --- Hub (landing) is served at the site root ---
          cp landing/index.html _site/index.html
          # Stamp the landing page with the last-change time (Israel time) so
          # visitors can tell whether they're on the latest deployed version.
          BUILD_TIME=$(TZ='Asia/Jerusalem' git log -1 --format=%cd --date=format-local:'%d/%m/%Y %H:%M')
          sed -i "s|__BUILD_TIME__|${BUILD_TIME}|" _site/index.html
          cp landing/manifest.webmanifest landing/sw.js _site/
          cp landing/icon-192.png landing/icon-512.png landing/icon-maskable-512.png landing/apple-touch-icon.png _site/

          # --- Tools: every other top-level dir that has an index.html ---
          for d in */; do
            d="${d%/}"
            case "$d" in
              landing|node_modules) continue ;;
            esac
            if [ -f "$d/index.html" ]; then
              echo "Deploying tool: $d"
              cp -r "$d" "_site/$d"
            fi
          done

          echo "Assembled site contents:"
          ls -la _site
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
