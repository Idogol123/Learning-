name: Deploy tools to Pages

# Publishes a single Pages site containing all browser tools, each under its
# own path, plus a landing page at the root:
#   /                       -> landing/index.html
#   /<tool>/                -> <tool>/   (auto-discovered: any top-level dir with an index.html)
#
# Tools are discovered automatically at build time, so adding a new tool needs
# NOTHING here — just create its directory (with an index.html) and add a card
# on the landing page. Runs on push to the default branch, or manually.

on:
  push:
    branches: [main]
    # Deploy on any content change EXCEPT files that never affect the live site.
    # This way a new tool directory is covered automatically (no path to update).
    paths-ignore:
      - ".claude/**"
      - "**/*.md"
      - ".gitignore"
      - ".mcp.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Assemble site
        run: bash .claude/tools/assemble-site.sh _site
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
