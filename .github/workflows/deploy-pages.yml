name: Deploy tools to Pages

# Publishes a single Pages site containing all browser tools, each under its
# own path, plus a landing page at the root:
#   /                       -> landing/index.html
#   /guard-duty-scheduler/  -> guard-duty-scheduler/
#   /file-search/           -> file-search/
# Runs on push to the default branch, or manually from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - "guard-duty-scheduler/**"
      - "file-search/**"
      - "landing/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Assemble site
        run: |
          mkdir -p _site
          cp landing/index.html _site/index.html
          # Stamp the landing page with the last-change time (Israel time) so
          # visitors can tell whether they're on the latest deployed version.
          BUILD_TIME=$(TZ='Asia/Jerusalem' git log -1 --format=%cd --date=format-local:'%d/%m/%Y %H:%M')
          sed -i "s|__BUILD_TIME__|${BUILD_TIME}|" _site/index.html
          cp landing/manifest.webmanifest _site/manifest.webmanifest
          cp landing/sw.js _site/sw.js
          cp landing/icon-192.png landing/icon-512.png landing/icon-maskable-512.png landing/apple-touch-icon.png _site/
          cp -r guard-duty-scheduler _site/guard-duty-scheduler
          cp -r file-search _site/file-search
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
