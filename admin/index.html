<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#f2f1ea" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#13140f" media="(prefers-color-scheme: dark)">
<title>לוח בקרה</title>
<link rel="icon" href="data:,">
<style>
  :root{
    --bg:#f2f1ea; --bg-2:#eae8de; --card:#fbfaf5; --ink:#1c1e16; --muted:#6b7061;
    --accent:#3d4a6b; --accent-ink:#333f5c; --line:#e0ded2; --line-strong:#d0cebf;
    --shadow:0 1px 2px rgba(35,38,22,.05), 0 10px 26px -12px rgba(35,38,22,.16);
    --shadow-hover:0 2px 4px rgba(35,38,22,.06), 0 18px 40px -14px rgba(35,38,22,.26);
    --radius:16px; --ease:cubic-bezier(.16,1,.3,1);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#13140f; --bg-2:#191b12; --card:#1c1e15; --ink:#edefe1; --muted:#9aa08c;
      --accent:#8593c4; --accent-ink:#97a4d0; --line:#2c2f23; --line-strong:#3a3d2e;
      --shadow:0 1px 2px rgba(0,0,0,.4), 0 12px 30px -14px rgba(0,0,0,.6);
      --shadow-hover:0 2px 4px rgba(0,0,0,.5), 0 20px 44px -14px rgba(0,0,0,.7);
    }
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Hebrew",Arial,sans-serif;
    background:var(--bg); color:var(--ink); direction:rtl; line-height:1.5;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; min-height:100vh;
  }

  /* ---- Lock screen (visible before unlock; reveals nothing about the panel) ---- */
  #lock{ min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px 20px calc(24px + env(safe-area-inset-bottom)); text-align:center; }
  #lock .box{ width:100%; max-width:340px; }
  #lock .seal{ width:60px; height:60px; margin:0 auto 18px; border-radius:17px; display:flex; align-items:center; justify-content:center;
    color:var(--accent); background:color-mix(in srgb, var(--accent) 12%, var(--card));
    border:1px solid color-mix(in srgb, var(--accent) 24%, transparent); box-shadow:var(--shadow); }
  #lock .seal svg{ width:30px; height:30px; }
  #lock h1{ font-size:23px; font-weight:800; letter-spacing:-.02em; margin:0 0 6px; }
  #lock p.hint{ color:var(--muted); font-size:13.5px; margin:0 0 22px; }
  #lock form{ display:flex; flex-direction:column; gap:11px; }
  #lock input{ font:inherit; font-size:16px; text-align:center; padding:14px 16px; border-radius:13px;
    border:1.5px solid var(--line-strong); background:var(--card); color:var(--ink); box-shadow:var(--shadow);
    transition:border-color .18s var(--ease); }
  #lock input:focus{ outline:none; border-color:var(--accent); }
  #lock button{ font:inherit; font-weight:700; font-size:15px; padding:14px 16px; border-radius:13px; border:0;
    background:var(--accent); color:var(--bg); cursor:pointer; box-shadow:var(--shadow);
    display:flex; align-items:center; justify-content:center; gap:9px; transition:transform .1s var(--ease), opacity .18s; }
  #lock button svg{ width:17px; height:17px; }
  #lock button:active{ transform:translateY(1px); }
  #lock button[disabled]{ opacity:.6; pointer-events:none; }
  #lock .err{ color:#c0392b; font-size:13px; font-weight:600; min-height:18px; margin-top:2px; }
  @media (prefers-color-scheme: dark){ #lock .err{ color:#f0917f; } }
  #lock .foot{ color:var(--muted); font-size:11.5px; margin-top:26px; line-height:1.6; max-width:300px; }
  .shake{ animation:shake .4s var(--ease); }
  @keyframes shake{ 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(3px)} }
  @media (prefers-reduced-motion: reduce){ .shake{ animation:none } * { transition:none !important } }
  #app{ min-height:100vh; }
</style>
</head>

  <div id="lock">
    <div class="box">
      <div class="seal" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
      <h1>לוח בקרה</h1>
      <p class="hint">אזור מוגן. הזן סיסמה כדי להיכנס.</p>

        <button id="go" type="submit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg><span id="goLabel">כניסה</span></button>
        <div class="err" id="err" role="alert"></div>
      </form>
      <p class="foot">התוכן מוצפן ב‑AES‑256‑GCM ונפתח רק עם הסיסמה הנכונה. אין שחזור סיסמה.</p>
    </div>
  </div>
  <div id="app"></div>

  var b2u = function(b){ return Uint8Array.from(atob(b), function(c){ return c.charCodeAt(0); }); };

  var form = document.getElementById('lockForm'), pw = document.getElementById('pw'),
      go = document.getElementById('go'), goLabel = document.getElementById('goLabel'),
      err = document.getElementById('err'), lock = document.getElementById('lock');

  // Escalating client-side throttle (defense-in-depth; per-session).
  function attempts(){ return parseInt(sessionStorage.getItem('adm_att') || '0', 10) || 0; }
  function delayFor(n){ return Math.min(8000, n <= 2 ? 0 : (n - 2) * 1200); }

  async function deriveKey(password){
    var km = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey({ name:'PBKDF2', salt: b2u(SALT_B64), iterations: ITER, hash:'SHA-256' },
      km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
  }

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    err.textContent = '';
    var wait = delayFor(attempts());
    go.setAttribute('disabled', ''); goLabel.textContent = wait ? 'נא להמתין…' : 'בודק…';
    if (wait) await new Promise(function(r){ setTimeout(r, wait); });
    goLabel.textContent = 'בודק…';
    try {
      var key = await deriveKey(pw.value);
      var pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv: b2u(IV_B64) }, key, b2u(CT_B64)); // throws on wrong password
      sessionStorage.removeItem('adm_att');
      var js = new TextDecoder().decode(pt);
      lock.remove();
      (new Function(js))();               // run the decrypted panel
    } catch (ex) {
      sessionStorage.setItem('adm_att', String(attempts() + 1));
      err.textContent = 'סיסמה שגויה';
      var box = document.querySelector('#lock .box');
      box.classList.remove('shake'); void box.offsetWidth; box.classList.add('shake');
      pw.value = ''; pw.focus();
    } finally {
      go.removeAttribute('disabled'); goLabel.textContent = 'כניסה';
    }
  });
  pw.focus();

  // Offline support for the shell.
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
  }
